<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Entropy Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4761d3;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #6f81cf;
        }

        .result-table {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
        }

        .result-table th, .result-table td {
            border: 1px solid #a0a8cc;
            padding: 8px;
            text-align: center;
        }

        .result-table th {
            background-color: #4761d3;
            color: white;
        }

        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }

    </style>
</head>
<body>

    <h1>Entropy Calculator</h1>
    <div class="container flex flex-grow">
        <div class="input-group flex flex-row justify-center items-center">
            <label for="positives">Number of Positive Instances (+):</label>
            <input type="number" id="positives" min="0" value="">
        </div>
        <div class="input-group">
            <label for="negatives">Number of Negative Instances (-):</label>
            <input type="number" id="negatives" min="0" value="">
        </div>
        <button onclick="calculateEntropy()">Calculate</button>
        <div id="error" class="error"></div>
        <table class="result-table" id="resultsTable" style="display: none;">
            <thead>
                <tr>
                    <th>P(+)</th>
                    <th>P(-)</th>
                    <th>(H)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="probPlus"></td>
                    <td id="probMinus"></td>
                    <td id="entropy"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function calculateEntropy() {
            // Get input values
            const positives = parseInt(document.getElementById('positives').value);
            const negatives = parseInt(document.getElementById('negatives').value);
            const errorDiv = document.getElementById('error');
            const resultsTable = document.getElementById('resultsTable');

            // Input validation
            if (isNaN(positives) || isNaN(negatives)) {
                errorDiv.textContent = "Please enter valid numbers for positives and negatives.";
                resultsTable.style.display = "none";
                return;
            }

            if (positives < 0 || negatives < 0) {
                errorDiv.textContent = "Number of instances cannot be negative.";
                resultsTable.style.display = "none";
                return;
            }

            const total = positives + negatives;

            if (total === 0) {
                errorDiv.textContent = "Total number of instances must be greater than zero.";
                resultsTable.style.display = "none";
                return;
            }

            // Clear any previous error messages
            errorDiv.textContent = "";

            // Calculate probabilities
            const pPlus = positives / total;
            const pMinus = negatives / total;

            // Function to handle log2(0) which is undefined; define 0 * log2(0) as 0
            function entropyComponent(p) {
                if (p === 0) {
                    return 0;
                }
                return p * Math.log2(p);
            }

            // Calculate entropy
            const entropy = - (entropyComponent(pPlus) + entropyComponent(pMinus));

            // Update the table with results, rounded to 4 decimal places
            document.getElementById('probPlus').textContent = pPlus.toFixed(4);
            document.getElementById('probMinus').textContent = pMinus.toFixed(4);
            document.getElementById('entropy').textContent = entropy.toFixed(4) + " bits";

            // Display the results table
            resultsTable.style.display = "table";
        }
    </script>

</body>
</html>
