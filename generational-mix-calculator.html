<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generational Mix Calculator</title>
    <!-- Include Bootstrap CSS for styling -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <!-- Include Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 900px;
            margin-top: 50px;
        }
        #result-section {
            display: none;
        }
        .back-button {
            margin-top: 20px;
        }
        canvas {
            max-width: 100%;
            height: 400px;
        }
        .breakdown {
            margin-top: 20px;
        }
        .footer {
            margin-top: 50px;
            text-align: center;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="input-section">
        <h1 class="text-center">Generational Mix Calculator</h1>
        <p class="text-center">Discover your generational mix based on your birth year.</p>
        <form id="year-form" class="mt-5">
            <div class="form-group">
                <label for="birthYear">Enter your birth year:</label>
                <input type="number" class="form-control" id="birthYear" placeholder="e.g., 1997" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Calculate</button>
        </form>
    </div>

    <div id="result-section">
        <h2 class="text-center">Your Generational Mix</h2>
        <canvas id="generationChart"></canvas>
        <div class="breakdown">
            <h4>Breakdown:</h4>
            <ul id="breakdown-list"></ul>
        </div>
        <button class="btn btn-secondary btn-block back-button">Back</button>
    </div>
    <div class="footer">
        <p>&copy; 2023 Mike's Coding Projects</p>
    </div>
</div>

<!-- Include jQuery and Bootstrap JS for interactivity (optional) -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<!-- Include Popper.js and Bootstrap JS for Bootstrap functionality (optional) -->
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

<script>
    // Define the generations with their start and end years
    const generations = [
        { name: 'Silent Generation', start: 1928, end: 1945, color: 'rgba(108, 117, 125, 0.5)' },
        { name: 'Baby Boomers', start: 1946, end: 1964, color: 'rgba(0, 123, 255, 0.5)' },
        { name: 'Generation X', start: 1965, end: 1980, color: 'rgba(40, 167, 69, 0.5)' },
        { name: 'Millennial', start: 1981, end: 1996, color: 'rgba(255, 193, 7, 0.5)' },
        { name: 'Generation Z', start: 1997, end: 2012, color: 'rgba(23, 162, 184, 0.5)' },
        { name: 'Generation Alpha', start: 2013, end: 2025, color: 'rgba(232, 62, 140, 0.5)' },
    ];

    // Function to calculate influence per generation
    function calculateInfluence(generation, years) {
        const influence = [];
        for (let y of years) {
            let value = 0;

            if (y >= generation.start && y <= generation.end) {
                // Define ramp-up, plateau, ramp-down periods
                const totalSpan = generation.end - generation.start + 1; // inclusive
                const rampUpYears = 3;
                const rampDownYears = 3;
                const plateauYears = totalSpan - rampUpYears - rampDownYears;

                const rampUpEnd = generation.start + rampUpYears - 1;
                const plateauEnd = rampUpEnd + plateauYears;
                const rampDownEnd = generation.end;

                if (y >= generation.start && y <= rampUpEnd) {
                    // Ramp-Up: 0% to 50%
                    value = ((y - generation.start + 1) / rampUpYears) * 50;
                } else if (y > rampUpEnd && y <= plateauEnd) {
                    // Plateau: 50%
                    value = 50;
                } else if (y > plateauEnd && y <= rampDownEnd) {
                    // Ramp-Down: 50% to 0%
                    value = ((generation.end - y + 1) / rampDownYears) * 50;
                }
            }

            influence.push(value);
        }
        return influence;
    }

    // Function to normalize influences so that sum per year is 100%
    function normalizeInfluences(generations, years) {
        const rawInfluences = generations.map(gen => calculateInfluence(gen, years));
        const normalizedInfluences = generations.map(() => []);

        for (let i = 0; i < years.length; i++) {
            let total = 0;
            for (let gen = 0; gen < generations.length; gen++) {
                total += rawInfluences[gen][i];
            }
            for (let gen = 0; gen < generations.length; gen++) {
                const normalized = total > 0 ? (rawInfluences[gen][i] / total) * 100 : 0;
                normalizedInfluences[gen].push(normalized);
            }
        }
        return normalizedInfluences;
    }

    const years = [];
    for (let y = 1900; y <= 2030; y++) {
        years.push(y);
    }

    let chart;

    document.getElementById('year-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const birthYearInput = document.getElementById('birthYear').value;
        const birthYear = parseInt(birthYearInput);
        if (isNaN(birthYear) || birthYear < 1900 || birthYear > 2030) {
            alert('Please enter a valid year between 1900 and 2030.');
            return;
        }
        computeGenerationalMix(birthYear);
        document.getElementById('input-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
    });

    document.querySelector('.back-button').addEventListener('click', function() {
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('input-section').style.display = 'block';
        if (chart) {
            chart.destroy();
        }
    });

    function computeGenerationalMix(birthYear) {
        const normalizedInfluences = normalizeInfluences(generations, years);
        const datasets = [];

        generations.forEach((gen, idx) => {
            datasets.push({
                label: gen.name,
                data: normalizedInfluences[idx],
                borderColor: gen.color.replace('0.5', '1'),
                backgroundColor: gen.color,
                fill: true,
                pointRadius: 0,
                borderWidth: 2,
            });
        });

        // Identify the generation(s) of the birth year
        const userIndex = years.indexOf(birthYear);
        let dominantGenerations = [];
        generations.forEach((gen, idx) => {
            if (normalizedInfluences[idx][userIndex] > 0) {
                dominantGenerations.push(idx);
            }
        });

        // Prepare data for the marker
        const markerDatasets = dominantGenerations.map(idx => {
            return {
                label: 'Your Birth Year',
                data: years.map((y, i) => (y === birthYear ? normalizedInfluences[idx][i] : null)),
                backgroundColor: 'red',
                borderColor: 'red',
                pointRadius: 6,
                pointHoverRadius: 8,
                type: 'scatter',
                showLine: false,
            };
        });

        // Combine all datasets
        const allDatasets = datasets.concat(markerDatasets);

        // Create the chart
        const ctx = document.getElementById('generationChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: years,
                datasets: allDatasets,
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    intersect: false,
                    mode: 'index',
                },
                scales: {
                    x: {
                        display: true,
                        title: {
                            display: true,
                            text: 'Year',
                        },
                        ticks: {
                            maxTicksLimit: 20,
                        },
                    },
                    y: {
                        display: true,
                        title: {
                            display: true,
                            text: 'Generation Influence (%)',
                        },
                        min: 0,
                        max: 100,
                        ticks: {
                            stepSize: 10,
                        },
                    },
                },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            filter: function(item, chart) {
                                // Hide the 'Your Birth Year' label duplicates
                                return item.text !== 'Your Birth Year' || !item.hidden;
                            }
                        }
                    },
                    tooltip: {
                        enabled: true,
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: function(context) {
                                if (context.dataset.label === 'Your Birth Year') {
                                    return `You (${birthYear}): ${context.parsed.y}%`;
                                }
                                return `${context.dataset.label}: ${context.parsed.y.toFixed(1)}%`;
                            }
                        }
                    },
                },
            },
        });

        // Display the breakdown
        const userMix = {};
        generations.forEach((gen, idx) => {
            const percentage = normalizedInfluences[idx][userIndex];
            if (percentage > 0.4) { // Considering floating point precision
                userMix[gen.name] = Math.round(percentage);
            }
        });

        const breakdownList = document.getElementById('breakdown-list');
        breakdownList.innerHTML = '';
        Object.keys(userMix).forEach(genName => {
            const listItem = document.createElement('li');
            listItem.textContent = `${genName}: ${userMix[genName]}%`;
            breakdownList.appendChild(listItem);
        });
    }
</script>
</body>
</html>
