<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generational Mix Calculator</title>
    <!-- Include Bootstrap CSS for styling -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <!-- Include Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Include Chart.js Annotation Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.1.0"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        #result-section {
            display: none;
        }
        .back-button {
            margin-top: 20px;
        }
        canvas {
            max-width: 100%;
            height: 400px;
        }
        .breakdown {
            margin-top: 20px;
        }
        .footer {
            margin-top: 50px;
            text-align: center;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="input-section">
        <h1 class="text-center">Generational Mix Calculator</h1>
        <p class="text-center">Discover your generational mix based on your birth year.</p>
        <form id="year-form" class="mt-5">
            <div class="form-group">
                <label for="birthYear">Enter your birth year:</label>
                <input type="number" class="form-control" id="birthYear" placeholder="e.g., 1997" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Calculate</button>
        </form>
    </div>

    <div id="result-section">
        <h2 class="text-center">Your Generational Mix</h2>
        <canvas id="generationChart"></canvas>
        <div class="breakdown">
            <h4>Breakdown:</h4>
            <ul id="breakdown-list"></ul>
        </div>
        <button class="btn btn-secondary btn-block back-button">Back</button>
    </div>
    <div class="footer">
        <p>&copy; 2023 Generational Mix Calculator</p>
    </div>
</div>

<!-- Include jQuery and Bootstrap JS for interactivity (optional) -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<!-- Include Popper.js and Bootstrap JS for Bootstrap functionality (optional) -->
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

<script>
    const generations = [
        { name: 'Silent Generation', start: 1928, end: 1945, color: '#6c757d' },
        { name: 'Baby Boomers', start: 1946, end: 1964, color: '#007bff' },
        { name: 'Generation X', start: 1965, end: 1980, color: '#28a745' },
        { name: 'Millennial', start: 1981, end: 1996, color: '#ffc107' },
        { name: 'Generation Z', start: 1997, end: 2012, color: '#17a2b8' },
        { name: 'Generation Alpha', start: 2013, end: 2025, color: '#e83e8c' },
    ];

    // Pre-compute centers and sigmas
    generations.forEach(gen => {
        gen.center = (gen.start + gen.end) / 2;
        gen.sigma = (gen.end - gen.start) / 2;
    });

    const years = [];
    for (let y = 1900; y <= 2030; y++) {
        years.push(y);
    }

    let chart;

    document.getElementById('year-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const birthYear = parseInt(document.getElementById('birthYear').value);
        if (isNaN(birthYear) || birthYear < 1900 || birthYear > 2030) {
            alert('Please enter a valid year between 1900 and 2030.');
            return;
        }
        computeGenerationalMix(birthYear);
        document.getElementById('input-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
    });

    document.querySelector('.back-button').addEventListener('click', function() {
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('input-section').style.display = 'block';
        if (chart) {
            chart.destroy();
        }
    });

    function computeGenerationalMix(birthYear) {
        const totalInfluence = [];
        const datasets = [];

        // Initialize totalInfluence array
        years.forEach(() => totalInfluence.push(0));

        generations.forEach(gen => {
            const influence = [];
            years.forEach((year, index) => {
                const value = Math.exp(-Math.pow(year - gen.center, 2) / (2 * Math.pow(gen.sigma, 2)));
                influence.push(value);
                totalInfluence[index] += value;
            });
            gen.influence = influence;
        });

        // Compute percentages
        generations.forEach(gen => {
            gen.percentage = gen.influence.map((value, index) => (value / totalInfluence[index]) * 100);
            datasets.push({
                label: gen.name,
                data: gen.percentage,
                borderColor: gen.color,
                backgroundColor: 'rgba(0,0,0,0)',
                fill: false,
                pointRadius: 0,
                borderWidth: 2,
            });
        });

        // Compute user's generational mix
        const userIndex = years.indexOf(birthYear);
        const userMix = {};
        generations.forEach(gen => {
            userMix[gen.name] = gen.percentage[userIndex];
        });

        // Plot the generation curves
        const ctx = document.getElementById('generationChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: years,
                datasets: datasets,
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    intersect: false,
                    mode: 'index',
                },
                scales: {
                    x: {
                        display: true,
                        title: {
                            display: true,
                            text: 'Year',
                        },
                    },
                    y: {
                        display: true,
                        title: {
                            display: true,
                            text: 'Generation Influence (%)',
                        },
                        min: 0,
                        max: 100,
                    },
                },
                plugins: {
                    legend: {
                        position: 'bottom',
                    },
                    annotation: {
                        annotations: {
                            line1: {
                                type: 'line',
                                scaleID: 'x',
                                value: birthYear,
                                borderColor: 'black',
                                borderWidth: 2,
                                label: {
                                    enabled: true,
                                    content: 'You (' + birthYear + ')',
                                    position: 'start',
                                    backgroundColor: 'rgba(0,0,0,0.7)',
                                    color: 'white',
                                    font: {
                                        weight: 'bold',
                                    },
                                },
                            },
                        },
                    },
                },
            },
        });

        // Display the breakdown
        const breakdownList = document.getElementById('breakdown-list');
        breakdownList.innerHTML = '';
        Object.keys(userMix).forEach(genName => {
            const percentage = userMix[genName];
            if (percentage >= 0.1) {
                const listItem = document.createElement('li');
                listItem.textContent = `${genName}: ${percentage.toFixed(1)}%`;
                breakdownList.appendChild(listItem);
            }
        });
    }
</script>
</body>
</html>
